<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Shop - Products</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="products">
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">E-commerce</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="products.html">Products</a>
          </li>
        </ul>
        <a href="cart.html" class="btn btn-outline-primary position-relative me-2">
          Cart
          <span
            id="cart-count"
            class="badge bg-primary text-white rounded-pill position-absolute top-0 start-100 translate-middle"
          >
            0
          </span>
        </a>
        <a href="login.html" class="btn btn-primary">Login</a>
      </div>
    </div>
  </nav>

  <!-- Feedback alert -->
  <div class="container mt-3">
    <div id="feedback" class="alert d-none" role="alert"></div>
  </div>

  <main class="py-4">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Products</h1>
        <a href="cart.html" class="text-decoration-none small">Go to Cart</a>
      </div>
      <p class="text-muted small mb-4">
        Browse the products below. You can view details or add items directly to your cart.
      </p>
      <div id="product-grid" class="row g-4">
        <!-- Filled by script.js -->
      </div>
    </div>
  </main>

  <footer class="border-top py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row justify-content-between">
      <p class="mb-2 mb-md-0 small text-muted">&copy; <span id="year"></span> Simple Shop</p>
      <p class="mb-0 small text-muted">
        Contact: <a href="mailto:contact@simpleshop.test" class="text-muted">contact@simpleshop.test</a>
      </p>
    </div>
  </footer>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="script.js"></script>
</body>
</html>
